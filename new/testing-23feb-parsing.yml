- hosts: localhost
  gather_facts: true

  vars:
    project_id: "orms-sta-project"
    zone: "asia-southeast2-a"
    region: "asia-southeast2"
    power_automate_webhook: "https://default4d237fc5b1dd42efa9e264887cb44b.21.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/ae661a2ed7514edcadc59661196aff27/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=uB31RGOx6Asj2iDJqF7LtWzOPOKPE5KXhCLg5J-_1Ss"

    locations:
      - "{{ zone }}"
      - "{{ region }}"
      - "global"

    recommenders:
      - id: "google.compute.instance.MachineTypeRecommender"
      - id: "google.cloudsql.instance.PerformanceRecommender"
      - id: "google.compute.instanceGroupManager.MachineTypeRecommender"
      - id: "google.container.cluster.NodePoolRecommender"
      - id: "google.compute.disk.IdleResourceRecommender"
      - id: "google.compute.image.IdleResourceRecommender"

  tasks:

###############################################################
# AUTH
###############################################################

  - name: Write SA key
    copy:
      content: "{{ gcp_sa_key }}"
      dest: /tmp/gcp-sa.json
      mode: '0600'

  - name: GCP Login
    command: gcloud auth activate-service-account --key-file=/tmp/gcp-sa.json
    changed_when: false

###############################################################
# FETCH RECOMMENDATIONS
###############################################################

  - set_fact:
      raw_recommendations: []

  - name: Fetch from all recommenders and locations
    loop: "{{ recommenders | product(locations) | list }}"
    loop_control:
      loop_var: combo
    vars:
      rec: "{{ combo.0 }}"
      loc: "{{ combo.1 }}"
    command: >
      gcloud recommender recommendations list
      --project {{ project_id }}
      --location {{ loc }}
      --recommender {{ rec.id }}
      --format=json
    register: rec_out
    changed_when: false
    failed_when: false

  - name: Merge results
    set_fact:
      raw_recommendations: "{{ raw_recommendations + (item.stdout | default('[]') | from_json) }}"
    loop: "{{ rec_out.results }}"

###############################################################
# DEBUG RAW DATA
###############################################################

  - name: DEBUG raw recommendation sample
    debug:
      msg:
        overview: "{{ item.content.overview | default('NO_OVERVIEW') }}"
        operations: "{{ item.content.operationGroups | default('NO_OPERATIONS') }}"
    loop: "{{ raw_recommendations }}"

###############################################################
# BUILD RECOMMENDATION LIST
###############################################################

  - set_fact:
      recommendations: []

  - name: Parse recommendation variables
    loop: "{{ raw_recommendations }}"
    loop_control:
      loop_var: item
    when:
      - item.primaryImpact is defined
      - item.primaryImpact.category == "COST"
      - item.content.overview is defined
    vars:

      operation: >-
        {{
          (item.content.operationGroups[0].operations
          | selectattr('action','equalto','replace')
          | list
          | first)
          if item.content.operationGroups is defined
          else {}
        }}

      resource_full: "{{ operation.resource | default('') }}"
      resource_name: "{{ resource_full.split('/')[-1] }}"
      location: "{{ item.name.split('/')[3] }}"
      resource_type: "{{ operation.resourceType | default('') }}"

      detected_type: >-
        {% if 'currentMachineType' in item.content.overview %}
        vm
        {% elif 'sqladmin.googleapis.com/Instance' in resource_type %}
        cloudsql
        {% elif 'compute.googleapis.com/InstanceGroupManager' in resource_type %}
        mig
        {% elif 'container.googleapis.com/NodePool' in resource_type %}
        gke
        {% elif 'compute.googleapis.com/Disk' in resource_type %}
        disk
        {% elif 'compute.googleapis.com/Image' in resource_type %}
        image
        {% elif 'compute.googleapis.com/Snapshot' in resource_type %}
        snapshot
        {% else %}
        other
        {% endif %}

      saving_amount: >-
        {{
          (
            (item.primaryImpact.costProjection.cost.units | default(0) | float)
            +
            ((item.primaryImpact.costProjection.cost.nanos | default(0) | float) / 1000000000)
          )
          | abs | round(2)
        }}

      current_machine: >-
        {% if detected_type == 'vm' %}
        {{ item.content.overview.currentMachineType.name }}
        {% else %}
        N/A
        {% endif %}

      recommended_machine: >-
        {% if detected_type == 'vm' %}
        {{ item.content.overview.recommendedMachineType.name }}
        {% else %}
        optimize
        {% endif %}

    debug:
      msg:
        resource: "{{ resource_name }}"
        detected_type: "{{ detected_type }}"
        current_machine: "{{ current_machine }}"
        recommended_machine: "{{ recommended_machine }}"

  - name: Append recommendation
    loop: "{{ raw_recommendations }}"
    loop_control:
      loop_var: item
    when:
      - item.primaryImpact is defined
      - item.primaryImpact.category == "COST"
      - item.content.overview is defined

    vars:
      current_machine: "{{ item.content.overview.currentMachineType.name }}"
      recommended_machine: "{{ item.content.overview.recommendedMachineType.name }}"
      resource_name: "{{ item.content.overview.resourceName }}"
      location: "{{ item.content.overview.location }}"
      saving_amount: >-
        {{
          (
            (item.primaryImpact.costProjection.cost.units | default(0) | float)
            +
            ((item.primaryImpact.costProjection.cost.nanos | default(0) | float) / 1000000000)
          )
          | abs | round(2)
        }}

    set_fact:
      recommendations: "{{ recommendations + [ {
        'type': 'vm',
        'resource': resource_name,
        'location': location,
        'current': current_machine,
        'recommended': recommended_machine,
        'estimated_saving': {
          'amount': saving_amount,
          'currency': 'USD'
        },
        'recommender_id': item.name
      } ] }}"

###############################################################
# DEBUG RESULT
###############################################################

  - name: DEBUG recommendations array
    debug:
      var: recommendations

###############################################################
# BUILD SUMMARY
###############################################################

  - name: Calculate total saving
    set_fact:
      total_saving: "{{ recommendations | map(attribute='estimated_saving.amount') | map('float') | sum | round(2) }}"

  - name: Build final report
    set_fact:
      final_report:
        project: "{{ project_id }}"
        locations: "{{ locations }}"
        generated_at: "{{ ansible_date_time.iso8601 }}"
        summary:
          total_recommendations: "{{ recommendations | length }}"
          total_estimated_saving: "{{ total_saving }}"
          currency: "USD"
        recommendations: "{{ recommendations }}"

###############################################################
# SEND TO POWER AUTOMATE
###############################################################

  - name: DEBUG final report
    debug:
      var: final_report

  - name: Send to Flow
    uri:
      url: "{{ power_automate_webhook }}"
      method: POST
      body_format: json
      body: "{{ final_report }}"
      status_code: [200, 202]
    register: flow_response

  - name: Show Flow response
    debug:
      var: flow_response
