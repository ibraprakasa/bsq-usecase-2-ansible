##################################################
# EVALUATE
##################################################

- name: Add instance if >= 80%
  set_fact:
    high_usage_list: "{{ high_usage_list + [ {
      'instance': instance,
      'cpu_percent': (cpu_usage * 100) | round(2),
      'memory_percent': (memory_usage * 100) | round(2),
      'disk_percent': (disk_usage * 100) | round(2)
    } ] }}"
  when: >
    cpu_usage | float >= cpu_threshold
    or memory_usage | float >= memory_threshold
    or disk_usage | float >= disk_threshold
