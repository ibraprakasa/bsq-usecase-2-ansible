##################################################
# CPU
##################################################

- name: Get CPU metric
  command: >
    gcloud monitoring time-series list
    --project {{ project_id }}
    --filter='metric.type="cloudsql.googleapis.com/database/cpu/utilization"
    AND resource.label.database_id="{{ instance }}"'
    --limit=1
    --format="value(points[0].value.doubleValue)"
  register: cpu_result
  changed_when: false
  failed_when: false

- set_fact:
    cpu_usage: "{{ cpu_result.stdout | default('0') | trim | float }}"

