- hosts: localhost
  gather_facts: false

  vars:
    power_automate_webhook: "https://default4d237fc5b1dd42efa9e264887cb44b.21.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/9d45c6f7a85443b3b6e177cdbed4593f/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=k_L8OAke-PRu1QeCdN9uajkJlzXq2ZWVXcT7eKnLYpo"

  tasks:

    - name: DEBUG incoming vars
      debug:
        var: ansible_eda.event

    # 🔹 STEP 1: ambil raw data
    - name: Normalize base values
      set_fact:
        metric_type: "{{ ansible_eda.event.payload.incident.metric.type }}"
        raw_value: "{{ ansible_eda.event.payload.incident.observed_value | float }}"
        raw_threshold: "{{ ansible_eda.event.payload.incident.threshold_value | float }}"

    # 🔹 STEP 2: convert otomatis berdasarkan metric
    - name: Convert metric values based on type
      set_fact:
        value_converted: >-
          {{
            ((raw_value | float) / 1073741824) | round(2)
            if 'memory' in metric_type else
            ((raw_value | float) / 1048576) | round(2)
            if 'network' in metric_type else
            ((raw_value | float) * 100) | round(2)
            if 'cpu' in metric_type else
            (raw_value | float) | round(3)
          }}

    threshold_converted: >-
      {{
        ((raw_threshold | float) / 1073741824) | round(2)
        if 'memory' in metric_type else
        ((raw_threshold | float) / 1048576) | round(2)
        if 'network' in metric_type else
        ((raw_threshold | float) * 100) | round(2)
        if 'cpu' in metric_type else
        (raw_threshold | float) | round(3)
      }}

    # 🔹 STEP 3: build report
    - name: Build formatted alert report
      set_fact:
        report:
          title: "🚨 GCP Alert Notification"
          status: "{{ ansible_eda.event.payload.incident.state | upper }}"
          project: "{{ ansible_eda.event.payload.incident.resource.labels.project_id }}"
          instance: "{{ ansible_eda.event.payload.incident.metric.labels.instance_name }}"
          metric: "{{ ansible_eda.event.payload.incident.metric.displayName }}"
          metric_type: "{{ metric_type }}"
          value: "{{ value_converted }}"
          threshold: "{{ threshold_converted }}"
          unit: "{{ unit }}"
          severity: "{{ ansible_eda.event.payload.incident.severity }}"
          summary: "{{ ansible_eda.event.payload.incident.summary }}"
          time_started: "{{ ansible_eda.event.payload.incident.started_at }}"
          link: "{{ ansible_eda.event.payload.incident.url }}"

    # 🔹 STEP 4: build message
    - name: Build Teams message
      set_fact:
        teams_payload:
          text: >
            🚨 <b>GCP Alert Detected</b><br><br>

            Status   : {{ report.status }}<br>
            Project  : {{ report.project }}<br>
            Instance : {{ report.instance }}<br><br>

            Metric   : {{ report.metric }} ({{ report.unit }})<br>
            Value    : {{ report.value }} {{ report.unit }}<br>
            Threshold: {{ report.threshold }} {{ report.unit }}<br><br>

            Severity : {{ report.severity }}<br><br>

            Summary:<br>
            {{ report.summary }}<br><br>

            🔗 <a href="{{ report.link }}">Click here to view alert</a>

    # 🔹 STEP 5: send ke Teams
    - name: Send alert to Teams
      uri:
        url: "{{ power_automate_webhook }}"
        method: POST
        body_format: json
        body: "{{ teams_payload }}"
        status_code: [200, 202]
        timeout: 15

    - name: Debug payload
      debug:
        var: teams_payload
