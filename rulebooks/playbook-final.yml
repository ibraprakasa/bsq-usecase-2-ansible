- hosts: localhost
  gather_facts: false

  vars:
    power_automate_webhook: "https://default4d237fc5b1dd42efa9e264887cb44b.21.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/9d45c6f7a85443b3b6e177cdbed4593f/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=k_L8OAke-PRu1QeCdN9uajkJlzXq2ZWVXcT7eKnLYpo"

  tasks:

    - name: Build formatted alert report
      set_fact:
        report:
          title: "🚨 GCP Alert Notification"
          status: "{{ state | upper }}"
          project: "{{ project }}"
          instance: "{{ instance_name }}"
          metric: "{{ metric }}"
          value: "{{ cpu }}"
          threshold: "{{ threshold }}"
          severity: "{{ severity }}"
          summary: "{{ summary }}"
          time_started: "{{ started_at }}"
          link: "{{ link }}"

    - name: Build Teams message (formatted)
      set_fact:
        teams_payload:
          text: |
            🚨 **GCP Alert Detected**

            **Status**   : {{ report.status }}
            **Project**  : {{ report.project }}
            **Instance** : {{ report.instance }}

            **Metric**   : {{ report.metric }}
            **Value**    : {{ report.value }}
            **Threshold**: {{ report.threshold }}

            **Severity** : {{ report.severity }}

            **Summary**:
            {{ report.summary }}

            🔗 {{ report.link }}

    - name: Send alert to Teams
      uri:
        url: "{{ power_automate_webhook }}"
        method: POST
        body_format: json
        body: "{{ teams_payload }}"
        status_code: [200, 202]

    - name: Debug payload
      debug:
        var: teams_payload
