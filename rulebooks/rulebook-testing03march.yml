- name: GCP Alert Listener
  hosts: localhost

  sources:
    - google.cloud.pubsub:
        project_id: orms-sta-project
        subscription: cloudsql-alert-sub

  rules:
    - name: CloudSQL CPU High
      condition: event.data.incident.state == "open"
      action:
        run_job_template:
          name: Case 2 - Report High Usage based on Rulebook
