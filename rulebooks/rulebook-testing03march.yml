### POST MODEL, GCP KE AAP ###
---
- name: CloudSQL High Usage Watchdog
  hosts: localhost

  sources:
    - ansible.eda.controller_event_stream:

  rules:

    - name: CloudSQL CPU High
      condition: true
      action:
        run_job_template:
          name: Case 2 - Report High Usage based on Rulebook
          extra_vars:
            usage_type: "CPU"
            incident: "{{ event.payload | default({}) }}"

    - name: CloudSQL Memory High
      condition: true
      action:
        run_job_template:
          name: Case 2 - Report High Usage based on Rulebook
          extra_vars:
            usage_type: "Memory"
            incident: "{{ event.payload | default({}) }}"

    - name: CloudSQL Disk High
      condition: true
      action:
        run_job_template:
          name: Case 2 - Report High Usage based on Rulebook
          extra_vars:
            usage_type: "Disk"
            incident: "{{ event.payload | default({}) }}"
