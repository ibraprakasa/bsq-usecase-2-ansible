---
- name: Listen GCP Monitoring Alerts
  hosts: localhost

  sources:
    - ansible.eda.gcp_pubsub:
        project_id: orms-sta-project
        subscription: cloudsql-alert-sub
        credentials_file: /runner/gcp-sa-preprod.json

  rules:

    - name: CPU alert detected
      condition: event.data.incident.state == "open"
      action:
        run_job_template:
          name: hello_world
          organization: Default
