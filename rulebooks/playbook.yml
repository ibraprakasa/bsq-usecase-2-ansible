- hosts: localhost
  gather_facts: false

  vars:
    project_id: "orms-sta-project"
    zone: "asia-southeast2-a"

    power_automate_webhook: "https://default4d237fc5b1dd42efa9e264887cb44b.21.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/9d45c6f7a85443b3b6e177cdbed4593f/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=k_L8OAke-PRu1QeCdN9uajkJlzXq2ZWVXcT7eKnLYpo"

  tasks:

    - name: Write SA key
      copy:
        content: "{{ gcp_sa_key }}"
        dest: /tmp/gcp-sa.json
        mode: '0600'

    - name: GCP Login
      command: gcloud auth activate-service-account --key-file=/tmp/gcp-sa.json
      changed_when: false

    - name: Get list of GCP instances
      google.cloud.gcp_compute_instance_info:
        project: "{{ project_id }}"
        zone: "{{ zone }}"
      register: instance_info

    - name: Build report payload
      set_fact:
        report:
          alert_type: "GCP_INSTANCE_REPORT"
          project: "{{ project_id }}"
          instance_count: "{{ instance_info.resources | length }}"
          instances: "{{ instance_info.resources | map(attribute='name') | list }}"
          severity: "INFO"

    - name: Send report to Teams via Power Automate
      uri:
        url: "{{ power_automate_webhook }}"
        method: POST
        body_format: json
        body: "{{ report }}"
        status_code: [200, 202]

    - name: Show report
      debug:
        var: report
